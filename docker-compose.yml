services:

  mysql:
    image: mysql:8.0.33
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=
      - MYSQL_USER=
      - MYSQL_PASSWORD=
      - MYSQL_ROOT_PASSWORD=
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    container_name: whisper
    restart: unless-stopped
    environment:
      ASR_DEVICE: cuda
      ASR_MODEL: large-v3
      ASR_ENGINE: openai_whisper
    ports:
      - "9010:9000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["2"]

  backend:
    build:
      context: ./Talancer-Backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    depends_on:
      - mysql
      - whisper
      - minio
    environment:
      TZ: Asia/Seoul
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/talancer?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: 
      SPRING_DATASOURCE_PASSWORD: 
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AI_SERVER_BASE_URL: http://ai:8001
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: 
      MINIO_SECRET_KEY: 
      MINIO_BUCKET: talancer-audio
    ports:
      - "8080:8080"

  ai:
    build:
      context: ./ai_server
      dockerfile: Dockerfile
    container_name: ai
    restart: unless-stopped
    depends_on:
      - whisper
      - mysql
      - backend
    environment:
      TZ: Asia/Seoul
      WHISPER_BASE_URL: http://whisper:9000
      WHISPER_ASR_PATH: /asr
      STT_SAMPLE_RATE: "16000"
      STT_CHANNELS: "1"
      STT_SAMPLE_WIDTH: "2"
      STT_CHUNK_SECONDS: "1.5"
      STT_MIN_CHUNK_SECONDS: "0.8"
      TRANSLATE_TARGET: ko
      NATIVE_LANG: ko
    ports:
      - "8000:8000"

  react:
    image: node:20-alpine
    container_name: reacT
    working_dir: /app
    volumes:
      - ./front:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    expose:
      - "5173"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - ai
      - backend
      - react

volumes:
  mysql_data:
  redis_data:
  minio_data:
