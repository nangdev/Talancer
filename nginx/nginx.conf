events {}

http {
  # Allow larger audio uploads from frontend -> backend (/api/stt/meetings/{id}/process)
  client_max_body_size 200m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 81;
    server_name _;
    return 301 https://$host:444$request_uri;
  }

  server {
    listen 444 ssl;
    server_name _;
    error_page 497 =307 https://$host:444$request_uri;

    ssl_certificate     /etc/nginx/certs/192.168.0.136+2.pem;
    ssl_certificate_key /etc/nginx/certs/192.168.0.136+2-key.pem;

    # ========================
    # React (Vite dev server)
    # ========================
    location / {
      proxy_pass http://react-dev:5174;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600;
      proxy_send_timeout 3600;
    }

    # ========================
    # AI WebSocket
    # ========================
    location /ws/stt {
      proxy_pass http://ai:8001/ws/stt;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 3600;
      proxy_send_timeout 3600;
    }

    # ========================
    # AI HTTP API
    # ========================
    location /ai/ {
      proxy_pass http://ai:8001/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========================
    # Backend
    # ========================
    location /api/ {
      proxy_pass http://talancer-backend:8088/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
